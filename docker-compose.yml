version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: onlineshop
      MYSQL_USER: root
      MYSQL_PASSWORD: ""

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: onlineshop
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/onlineshop.sql:/docker-entrypoint-initdb.d/onlineshop.sql:ro

volumes:
  db_data:
